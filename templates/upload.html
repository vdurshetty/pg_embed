<!DOCTYPE html>
<html>
<head>
    <title>Upload File using REST API</title>
</head>
<body>

<h2>Upload File using REST API</h2>

<input type="file" id="fileInput">
<br><br>

<button onclick="uploadFile()">Upload</button>

<p id="status"></p>

<script>
async function uploadFile() {
    hostname = window.location.hostname;
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length === 0) {
        document.getElementById('status').innerText = "Please select a file!";
        return;
    }

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    document.getElementById('status').innerText = "Uploading...";

    try {
        const response = await fetch("/upload_docs", {
            method: "POST",
            body: formData
        });

        const result = await response.text();
        document.getElementById('status').innerText = result;

    } catch (error) {
        document.getElementById('status').innerText = "Error uploading file!";
        console.error(error);
    }
}
</script>

</body>
</html>
