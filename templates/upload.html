<!DOCTYPE html>
<html>
<head>
    <title>Upload File using REST API</title>
</head>
<body>

<h2>Upload File using REST API</h2>
    <table border="1">
        <tr>
            <td>Select File Type </td>
            <td><select id="categorySelect">
                    <option value="docs">PDF Files</option>
                    <option value="image">Image Files</option>
                    <option value="voice">Voice Recordings</option>
             </select>
            </td>
        </tr>
        <tr><td>Choose file : </td>
        <td><input type="file" id="fileInput"></td>
        </tr>
        <tr><td>Upload File </td><td><button onclick="uploadFile()">Upload</button></td></tr>
        <tr><td>Status : </td><td><p id="status"></p></td></tr>
    </table>



<script>
async function uploadFile() {
    hostname = window.location.hostname;
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length === 0) {
        document.getElementById('status').innerText = "Please select a file!";
        return;
    }

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);
    const selectedType = document.getElementById("categorySelect").value;
    console.log(selectedType);
    document.getElementById('status').innerText = "Uploading...";

    try {
        const response = await fetch("/upload_docs", {
            method: "POST",
            headers: {
                "type": selectedType,
            },
            body: formData
        });

        const result = await response.text();
        document.getElementById('status').innerText = result;

    } catch (error) {
        document.getElementById('status').innerText = "Error uploading file!";
        console.error(error);
    }
}
</script>

</body>
</html>
