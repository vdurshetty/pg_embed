<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
<html>
<head>
    <title>Live Voice Recorder</title>
</head>
<body>

<h2>🎤 Live Voice Recorder</h2>

<button id="startBtn">Start Recording</button>
<button id="stopBtn" disabled>Stop Recording</button>

<h3>Status: <span id="status">Idle</span></h3>

<!-- <a id="downloadLink" style="display:none;" download="recording.wav">Download Recording</a> -->
<a id="downloadLink" style="display:none;" download="recording.wav">Download Recording</a>

<script>
let mediaRecorder;
let audioChunks = [];

document.getElementById("startBtn").onclick = async function () {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    audioChunks = [];
    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

    mediaRecorder.onstop = () => {
        // const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
        const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
        const audioUrl = URL.createObjectURL(audioBlob);

        // Enable download
        const link = document.getElementById("downloadLink");
        link.href = audioUrl;
        link.style.display = "block";

        document.getElementById("status").innerText = "Recording saved!";
    };

    mediaRecorder.start();
    document.getElementById("status").innerText = "Recording...";
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
};

document.getElementById("stopBtn").onclick = function () {
    mediaRecorder.stop();
    document.getElementById("status").innerText = "Stopping...";
    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
};
</script>

</body>
</html>
</title>
</head>
