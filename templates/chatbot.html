<!DOCTYPE html>
<html>
<head>
  <title>Chatbot with Image + Voice</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
    .msg { margin: 5px 0; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>

<h2>Chatbot</h2>

<div id="chat"></div>

<input type="text" id="textInput" placeholder="Type a message..." />
<button onclick="sendText()">Send</button>

<br><br>

<!-- Image Upload -->
<input type="file" id="imageInput" accept="image/*" />
<button onclick="uploadImage()">Upload Image</button>

<br><br>

<!-- Voice Recording -->
<button id="recordBtn" onclick="toggleRecording()">🎤 Start Recording</button>

<script>
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

function addMessage(text, sender) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerText = sender + ": " + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendText() {
  const input = document.getElementById("textInput");
  const message = input.value;
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: message })
  });

  const data = await res.json();
  addMessage(data.reply, "bot");
}

async function uploadImage() {
  const fileInput = document.getElementById("imageInput");
  const file = fileInput.files[0];
  if (!file) return;

  addMessage("Image uploaded: " + file.name, "user");

  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch("/api/image", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  addMessage(data.reply, "bot");
}

async function toggleRecording() {
  const btn = document.getElementById("recordBtn");

  if (!isRecording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = e => {
      audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      addMessage("Voice message recorded", "user");
      file_name = addDateTimeToFilename("voice.webm")
      console.log("File Name :", file_name);
      const formData = new FormData();
      formData.append("file", blob, file_name);
      console.log("filled form data also ....");

      try {
        const response = await fetch("/upload_docs", {
            method: "POST",
            headers: {
                "type": "voice",
            },
            body: formData
        });

        const result = await response.text();
        addMessage(result, "bot");
      } catch (error) {
          document.getElementById('status').innerText = "Error uploading file!";
          console.error(error);
      }
    };

    mediaRecorder.start();
    isRecording = true;
    btn.innerText = "⏹ Stop Recording";
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.innerText = "🎤 Start Recording";
  }
}



function addDateTimeToFilename(filename) {
  const now = new Date();

  const datetime = now.getFullYear() +
    "-" + String(now.getMonth() + 1).padStart(2, '0') +
    "-" + String(now.getDate()).padStart(2, '0') +
    "_" + String(now.getHours()).padStart(2, '0') +
    "-" + String(now.getMinutes()).padStart(2, '0') +
    "-" + String(now.getSeconds()).padStart(2, '0');

  const parts = filename.split('.');
  const name = parts.slice(0, -1).join('.');
  const ext = parts.length > 1 ? parts.pop() : '';

  return ext
    ? `${name}_${datetime}.${ext}`
    : `${name}_${datetime}`;
}

// Webm to Wave file conversion
async function webmToWav(webmBlob) {
  const arrayBuffer = await webmBlob.arrayBuffer();

  const audioContext = new (window.AudioContext || window.webkitAudioContext)();

  const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

  const wavBuffer = encodeWAV(audioBuffer);

  return new Blob([wavBuffer], { type: "audio/wav" });
}

function encodeWAV(audioBuffer) {
  const numOfChannels = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const length = audioBuffer.length * numOfChannels * 2 + 44;

  const buffer = new ArrayBuffer(length);
  const view = new DataView(buffer);

  function writeString(view, offset, string) {
    for (let i = 0; i < string.length; i++) {
      view.setUint8(offset + i, string.charCodeAt(i));
    }
  }

  let offset = 0;

  writeString(view, offset, 'RIFF'); offset += 4;
  view.setUint32(offset, 36 + audioBuffer.length * numOfChannels * 2, true); offset += 4;
  writeString(view, offset, 'WAVE'); offset += 4;
  writeString(view, offset, 'fmt '); offset += 4;

  view.setUint32(offset, 16, true); offset += 4;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint16(offset, numOfChannels, true); offset += 2;
  view.setUint32(offset, sampleRate, true); offset += 4;
  view.setUint32(offset, sampleRate * numOfChannels * 2, true); offset += 4;
  view.setUint16(offset, numOfChannels * 2, true); offset += 2;
  view.setUint16(offset, 16, true); offset += 2;

  writeString(view, offset, 'data'); offset += 4;
  view.setUint32(offset, audioBuffer.length * numOfChannels * 2, true); offset += 4;

  // Interleave channels
  const channels = [];
  for (let i = 0; i < numOfChannels; i++) {
    channels.push(audioBuffer.getChannelData(i));
  }

  let pos = offset;
  for (let i = 0; i < audioBuffer.length; i++) {
    for (let ch = 0; ch < numOfChannels; ch++) {
      let sample = Math.max(-1, Math.min(1, channels[ch][i]));
      sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
      view.setInt16(pos, sample, true);
      pos += 2;
    }
  }

  return buffer;
}

</script>

</body>
</html>
